# /etc/fritzhome-cache/fritzhome-cache.conf
#
# Configuration file for fritzhome-cache — Fritz!Box Smart Home API cache proxy.
#
# Each key corresponds to a command-line flag with the same name (strip the
# leading --).  Command-line arguments always override values set here.
#
# The file is read automatically at startup when it exists at this path.
# Use --config /alternative/path on the command line (or in a systemd drop-in)
# to load a different file instead.
#
# All lines below are commented out and show the built-in default values.
# Uncomment and edit the lines you want to change.

## ── Fritz!Box upstream ───────────────────────────────────────────────────────

# Fritz!Box hostname or IP[:port].
# fritzbox-addr = fritz.box

# Upstream scheme.  Use https if your Fritz!Box is configured for HTTPS.
# fritzbox-scheme = http

## ── Proxy listener ───────────────────────────────────────────────────────────

# Address the proxy binds to.
# Change to 0.0.0.0 to accept connections from other hosts; ensure the port
# is protected by a firewall when doing so.
# listen-addr = 127.0.0.1

# TCP port the proxy listens on.
# listen-port = 8080

## ── TLS listener — HTTPS on the proxy's own listening socket ─────────────────
# Three mutually exclusive modes:
#
#   File-based TLS : set both tls-cert and tls-key to PEM file paths.
#                    The service user must be able to read both files.
#
#   Self-signed TLS: set tls-self-signed = true.
#                    An RSA-2048 certificate is generated in memory at startup.
#                    No files are needed, but clients will see a certificate
#                    warning unless they explicitly trust it.
#                    Cannot be combined with tls-cert / tls-key.
#
#   Plain HTTP     : leave all three at their defaults (no HTTPS).

# Path to a PEM certificate file (file-based TLS).
# tls-cert =

# Path to a PEM private key file (file-based TLS).
# tls-key =

# Generate an in-memory self-signed certificate at startup.
# tls-self-signed = false

## ── Cache TTLs (seconds) ─────────────────────────────────────────────────────

# Default TTL for all cacheable GET responses.
# ttl = 5

# TTL override for /api/v0/smarthome/overview.
# When unset, the value of ttl is used.
# ttl-overview = 5

# TTL override for /api/v0/smarthome/overview/units/*.
# When unset, the value of ttl is used.
# ttl-units = 5

# How often (seconds) the background sweeper wakes to purge expired entries.
# When unset, defaults to max(1, ttl/2).
# sweep-interval = 2

## ── Concurrency ──────────────────────────────────────────────────────────────

# Number of worker threads.
# threads = 4

## ── Logging ──────────────────────────────────────────────────────────────────

# Log verbosity written to stderr.
# 0 = silent  1 = error (default)  2 = warn  3 = info  4 = debug  5 = trace
# log-level = 1

## ── Upstream TLS verification ─────────────────────────────────────────────────

# Verify the Fritz!Box TLS certificate when fritzbox-scheme = https.
# Disabled by default because most Fritz!Box units use a self-signed certificate.
# verify-tls = false

## ── Graceful shutdown ─────────────────────────────────────────────────────────

# Maximum time (seconds) to wait for in-flight requests to finish on SIGTERM.
# shutdown-timeout = 5
